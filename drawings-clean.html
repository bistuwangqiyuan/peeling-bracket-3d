<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D工程图纸（纯净版）— 管道防腐层胶带剥离支架</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e8e8;font-family:'SimSun','宋体',serif;color:#000}
#toolbar{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #ccc;
  display:flex;align-items:center;gap:4px;padding:6px 12px;flex-wrap:wrap}
#toolbar button,#toolbar a{padding:5px 12px;border:1px solid #999;border-radius:4px;background:#fff;cursor:pointer;
  font-size:13px;font-family:inherit;transition:all .15s;text-decoration:none;color:#000;display:inline-block}
#toolbar button:hover,#toolbar a:hover{background:#333;color:#fff;border-color:#333}
#toolbar .sep{width:1px;height:24px;background:#ccc;margin:0 4px}
#toolbar .title{font-weight:bold;font-size:14px;margin-right:8px}
.pages{padding:50px 0 20px;display:flex;flex-direction:column;align-items:center;gap:20px}
.page{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15);width:210mm;height:297mm;position:relative;overflow:hidden}
.page svg{width:100%;height:100%;display:block}
@media print{
  body{background:#fff}
  #toolbar{display:none!important}
  .pages{padding:0;gap:0}
  .page{box-shadow:none;page-break-after:always;margin:0}
}
</style>
</head>
<body>
<div id="toolbar">
  <span class="title">2D图纸（纯净版·无标号）</span>
  <button onclick="scrollToFig(1)">图1 立体图</button>
  <button onclick="scrollToFig(2)">图2 主视图</button>
  <button onclick="scrollToFig(3)">图3 左视图</button>
  <button onclick="scrollToFig(4)">图4 俯视图</button>
  <button onclick="scrollToFig(5)">图5 推杆</button>
  <button onclick="scrollToFig(6)">图6 夹具</button>
  <button onclick="scrollToFig(7)">图7 轮组</button>
  <div class="sep"></div>
  <a href="drawings.html">带标号版</a>
  <a href="index.html">3D模型</a>
  <a href="patent.html">专利文档</a>
  <div class="sep"></div>
  <button onclick="window.print()">🖨 打印全部</button>
</div>
<div class="pages" id="pages"></div>

<script>
const NS='http://www.w3.org/2000/svg';
const pages=document.getElementById('pages');
function scrollToFig(n){document.getElementById('fig'+n).scrollIntoView({behavior:'smooth',block:'start'});}
function el(parent,tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs||{})) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
}
function makePage(figNum,title){
  const div=document.createElement('div');
  div.className='page';div.id='fig'+figNum;
  pages.appendChild(div);
  const svg=el(null,'svg',{viewBox:'0 0 210 297',xmlns:NS});
  div.appendChild(svg);
  const tg=el(svg,'g');
  const bx=25,by=283,bw=170,bh=8;
  el(tg,'rect',{x:bx,y:by,width:bw,height:bh,stroke:'#000','stroke-width':'0.4',fill:'none'});
  el(tg,'line',{x1:bx+bw*0.6,y1:by,x2:bx+bw*0.6,y2:by+bh,stroke:'#000','stroke-width':'0.3'});
  const t1=el(tg,'text',{x:bx+bw*0.3,y:by+bh/2,'font-size':'3.5','text-anchor':'middle','dominant-baseline':'central',fill:'#000'});
  t1.textContent='图'+figNum+'  '+title;
  const t2=el(tg,'text',{x:bx+bw*0.8,y:by+bh/2,'font-size':'3','text-anchor':'middle','dominant-baseline':'central',fill:'#000'});
  t2.textContent='管道防腐层胶带剥离支架';
  return svg;
}
function line(g,x1,y1,x2,y2,dash){
  el(g,'line',{x1,y1,x2,y2,stroke:'#000','stroke-width':dash?'0.2':'0.35',
    'stroke-dasharray':dash?'1.5,1':'none',fill:'none'});
}
function rect(g,x,y,w,h,opts){
  const a={x,y,width:w,height:h,stroke:'#000','stroke-width':opts?.lw||'0.35',fill:opts?.fill||'none'};
  if(opts?.dash) a['stroke-dasharray']='1.5,1';
  el(g,'rect',a);
}
function circle(g,cx,cy,r,opts){
  el(g,'circle',{cx,cy,r,stroke:'#000','stroke-width':opts?.lw||'0.25',fill:opts?.fill||'none'});
}
function ellipse(g,cx,cy,rx,ry){
  el(g,'ellipse',{cx,cy,rx,ry,stroke:'#000','stroke-width':'0.25',fill:'none'});
}

const P=30,L=600,W=120,H=300,BL=500,BT=10,WH=62;

/* ===== 图1: 立体图 ===== */
function drawIso(svg){
  const g=el(svg,'g',{transform:'translate(108,140)'});
  const s=1/5,cos30=0.866,sin30=0.5;
  function iso(x,y,z){return[(x-z)*cos30*s,(-y+(x+z)*sin30)*s];}
  function iL(g2,x1,y1,z1,x2,y2,z2,dash){const[a,b]=iso(x1,y1,z1),[c,d]=iso(x2,y2,z2);line(g2,a,b,c,d,dash);}
  function isoBox(g2,x,y,z,w,h,d){
    var X=x+w,Y=y+h,Z=z+d;
    iL(g2,x,y,z,X,y,z);iL(g2,X,y,z,X,y,Z);iL(g2,X,y,Z,x,y,Z);iL(g2,x,y,Z,x,y,z);
    iL(g2,x,Y,z,X,Y,z);iL(g2,X,Y,z,X,Y,Z);iL(g2,X,Y,Z,x,Y,Z);iL(g2,x,Y,Z,x,Y,z);
    iL(g2,x,y,z,x,Y,z);iL(g2,X,y,z,X,Y,z);iL(g2,X,y,Z,X,Y,Z);iL(g2,x,y,Z,x,Y,Z);
  }
  const bx=-L/2,bz=-W/2;
  isoBox(g,bx,0,bz,L,P,P);isoBox(g,bx,0,bz+W-P,L,P,P);
  isoBox(g,bx,0,bz+P,P,P,W-2*P);isoBox(g,bx+L-P,0,bz+P,P,P,W-2*P);
  [[bx,bz],[bx+L-P,bz],[bx,bz+W-P],[bx+L-P,bz+W-P]].forEach(([vx,vz])=>{isoBox(g,vx,P,vz,P,H-P,P);});
  isoBox(g,bx,H,bz,L,P,P);isoBox(g,bx,H,bz+W-P,L,P,P);
  isoBox(g,bx,H,bz+P,P,P,W-2*P);isoBox(g,bx+L-P,H,bz+P,P,P,W-2*P);
  isoBox(g,-BL/2,H+P,-P/2,BL,BT,P);
  for(let hx=0;hx<=BL/2-8;hx+=20){
    [hx,-hx].forEach(dx=>{if(dx===0&&hx!==0)return;const[hcx,hcy]=iso(dx,H+P+BT,0);circle(g,hcx,hcy,0.9*s,{lw:'0.15'});});
  }
  isoBox(g,-18,P+7+14,-18,36,130,36);
  iL(g,-3,P+7+14+130,0,-3,H+P,0);iL(g,3,P+7+14+130,0,3,H+P,0);
  isoBox(g,-24,P+7,-67/2+35,48,32,67);
  [[-120,0],[120,0]].forEach(([px2,pz2])=>{
    const[a,b]=iso(px2,H+P,pz2),[c,d]=iso(px2,H+P-240,pz2);line(g,a,b,c,d);
    const[sx,sy]=iso(px2,H+P-218,pz2);ellipse(g,sx,sy,2.2*s,1.2*s);
    const[cx2,cy2]=iso(px2,H+P-240,pz2);rect(g,cx2-3*s,cy2-1*s,6*s,5*s);
    const[tx,ty]=iso(px2,H+P-258,pz2),[bx2,by2]=iso(px2,H+P-350,pz2);line(g,tx,ty,bx2,by2);
  });
  [[-L/2+P/2,-W/2+P/2],[L/2-P/2,-W/2+P/2],[-L/2+P/2,W/2-P/2],[L/2-P/2,W/2-P/2]].forEach(([wx,wz])=>{
    const wcy=-WH+18;const[wcx2,wcy2]=iso(wx,wcy,wz);
    ellipse(g,wcx2,wcy2,18*s*0.8,18*s*0.5);
    circle(g,wcx2,wcy2,3*s,{lw:'0.15'});
    iL(g,wx,0,wz,wx,-5,wz);
    const[fL,fLy]=iso(wx-7,-5,wz),[fR,fRy]=iso(wx+7,-5,wz);
    const[fLb,fLyb]=iso(wx-7,wcy-9,wz),[fRb,fRyb]=iso(wx+7,wcy-9,wz);
    line(g,fL,fLy,fLb,fLyb);line(g,fR,fRy,fRb,fRyb);line(g,fL,fLy,fR,fRy);
    iL(g,wx-18,wcy,wz,wx+18,wcy,wz);
  });
}

/* ===== 图2: 主视图 ===== */
function drawFront(svg){
  const s=1/4,cx=110,cy=160;
  function px(x){return cx+x*s;}function py(y){return cy-y*s;}function ps(d){return Math.abs(d*s);}
  const g=el(svg,'g');
  rect(g,px(-L/2),py(P),ps(L),ps(P));
  rect(g,px(-L/2),py(P),ps(P),ps(P),{dash:true});rect(g,px(L/2-P),py(P),ps(P),ps(P),{dash:true});
  rect(g,px(-25-P/2),py(P),ps(P),ps(P),{dash:true});rect(g,px(25-P/2),py(P),ps(P),ps(P),{dash:true});
  [[-L/2],[L/2-P]].forEach(([xx])=>{rect(g,px(xx),py(H),ps(P),ps(H-P));});
  [[-L/2],[L/2-P]].forEach(([xx])=>{rect(g,px(xx),py(H),ps(P),ps(H-P),{dash:true});});
  rect(g,px(-L/2),py(H+P),ps(L),ps(P));
  rect(g,px(-BL/2),py(H+P+BT),ps(BL),ps(BT));
  for(let hx=0;hx<=BL/2-8;hx+=20){circle(g,px(hx),py(H+P+BT/2),3*s/2,{lw:'0.15'});if(hx>0)circle(g,px(-hx),py(H+P+BT/2),3*s/2,{lw:'0.15'});}
  rect(g,px(-30),py(P+7),ps(60),ps(7));rect(g,px(-24),py(P+7+32),ps(48),ps(32));
  rect(g,px(-21),py(P+7+32+14),ps(42),ps(14));rect(g,px(-18),py(P+7+46+130),ps(36),ps(130));
  line(g,px(-6),py(P+7+46+130),px(-6),py(H+P));line(g,px(6),py(P+7+46+130),px(6),py(H+P));
  circle(g,px(0),py(H+P-3),ps(10),{lw:'0.15'});
  [-120,120].forEach(sx=>{
    line(g,px(sx),py(H+P),px(sx),py(H+P-240));
    ellipse(g,px(sx),py(H+P-218),ps(15),ps(7.5));
    rect(g,px(sx-10),py(H+P-232),ps(20),ps(8));rect(g,px(sx-2),py(H+P-232-6),ps(4),ps(16));
    rect(g,px(sx+2),py(H+P-232-6),ps(4),ps(16));rect(g,px(sx-10),py(H+P-258),ps(20),ps(150),{lw:'0.2'});
  });
  [[-L/2+P/2],[L/2-P/2]].forEach(([wx])=>{
    const wcy=-WH+18;circle(g,px(wx),py(wcy),ps(18));circle(g,px(wx),py(wcy),ps(3));
    rect(g,px(wx-16),py(0),ps(32),ps(5));
    line(g,px(wx-11),py(0),px(wx-11),py(wcy+22));line(g,px(wx+11),py(0),px(wx+11),py(wcy+22));
    line(g,px(wx-11),py(wcy+22),px(wx-7),py(wcy+22));line(g,px(wx+11),py(wcy+22),px(wx+7),py(wcy+22));
    line(g,px(wx-7),py(wcy+22),px(wx-7),py(wcy-9));line(g,px(wx+7),py(wcy+22),px(wx+7),py(wcy-9));
  });
}

/* ===== 图3: 左视图 ===== */
function drawLeft(svg){
  const s=1/3,cx=105,cy=165;
  function px(z){return cx+z*s;}function py(y){return cy-y*s;}function ps(d){return Math.abs(d*s);}
  const g=el(svg,'g');
  rect(g,px(-W/2),py(P),ps(W),ps(P));rect(g,px(-W/2),py(H+P),ps(W),ps(P));
  rect(g,px(-W/2),py(H),ps(P),ps(H-P));rect(g,px(W/2-P),py(H),ps(P),ps(H-P));
  rect(g,px(-W/2+P),py(H),ps(P),ps(H-P),{dash:true});rect(g,px(W/2-2*P),py(H),ps(P),ps(H-P),{dash:true});
  rect(g,px(-P/2),py(H+P+BT),ps(P),ps(BT));
  const mCz=35+24-67/2;
  rect(g,px(-40+35/2),py(P+7),ps(80),ps(7));
  rect(g,px(mCz-67/2),py(P+7+32),ps(67),ps(32));circle(g,px(mCz),py(P+7+16),ps(18),{lw:'0.15'});
  rect(g,px(-31+mCz*0.4),py(P+7+32+14),ps(62),ps(14));
  rect(g,px(-18),py(P+7+46+130),ps(36),ps(130));
  line(g,px(-6),py(P+7+46+130),px(-6),py(H+P));line(g,px(6),py(P+7+46+130),px(6),py(H+P));
  [[-W/2+P/2],[W/2-P/2]].forEach(([wz])=>{
    const wcy=-WH+18;circle(g,px(wz),py(wcy),ps(18));circle(g,px(wz),py(wcy),ps(3));
    rect(g,px(wz-16),py(0),ps(32),ps(5));line(g,px(wz),py(0),px(wz),py(wcy+22));
  });
}

/* ===== 图4: 俯视图 ===== */
function drawTop(svg){
  const s=1/4,cx=110,cy=140;
  function px(x){return cx+x*s;}function pz(z){return cy+z*s;}function ps(d){return Math.abs(d*s);}
  const g=el(svg,'g');
  rect(g,px(-L/2),pz(-W/2),ps(L),ps(P),{dash:true});rect(g,px(-L/2),pz(W/2-P),ps(L),ps(P),{dash:true});
  rect(g,px(-L/2),pz(-W/2+P),ps(P),ps(W-2*P),{dash:true});rect(g,px(L/2-P),pz(-W/2+P),ps(P),ps(W-2*P),{dash:true});
  rect(g,px(-BL/2),pz(-P/2),ps(BL),ps(P),{lw:'0.5'});
  for(let hx=0;hx<=BL/2-8;hx+=20){circle(g,px(hx),pz(0),3*s/2,{lw:'0.15'});if(hx>0)circle(g,px(-hx),pz(0),3*s/2,{lw:'0.15'});}
  rect(g,px(-L/2),pz(-W/2),ps(L),ps(W),{lw:'0.5'});
  rect(g,px(-18),pz(-18),ps(36),ps(36),{dash:true});
  [-120,120].forEach(sx=>{circle(g,px(sx),pz(0),1.2);});
}

/* ===== 图5: 推杆 ===== */
function drawAct(svg){
  const s=2,cx=105,cy=200;
  function px(x){return cx+x*s;}function py(y){return cy-y*s;}function ps(d){return Math.abs(d*s);}
  const g=el(svg,'g');
  rect(g,px(-30),py(7),ps(60),ps(7));
  [[-24],[24]].forEach(([bx2])=>{circle(g,px(bx2),py(3),ps(3),{fill:'#000',lw:'0.15'});});
  rect(g,px(-24),py(7+32),ps(48),ps(32));circle(g,px(0),py(7+16),ps(18),{lw:'0.25'});circle(g,px(0),py(7+16),ps(20),{lw:'0.15'});
  rect(g,px(-21),py(7+32+14),ps(42),ps(14));rect(g,px(-18),py(7+46+130),ps(36),ps(130));
  rect(g,px(-19),py(7+46+10),ps(38),ps(10));rect(g,px(-19),py(7+46+130-5),ps(38),ps(10));
  rect(g,px(-20),py(7+46+40),ps(40),ps(3),{lw:'0.15'});rect(g,px(-20),py(7+46+90),ps(40),ps(3),{lw:'0.15'});
  line(g,px(-6),py(7+46+130),px(-6),py(7+46+170));line(g,px(6),py(7+46+130),px(6),py(7+46+170));
  circle(g,px(0),py(7+46+175),ps(10),{lw:'0.25'});line(g,px(-12.5),py(7+46+175),px(12.5),py(7+46+175));
}

/* ===== 图6: 夹具 ===== */
function drawClamp(svg){
  const s=3,cx=105,cy=155;
  function px(x){return cx+x*s;}function py(y){return cy-y*s;}function ps(d){return Math.abs(d*s);}
  const g=el(svg,'g');
  line(g,px(0),py(25),px(0),py(13));circle(g,px(0),py(25),ps(4),{fill:'#000'});
  ellipse(g,px(0),py(7),ps(15),ps(7.5));circle(g,px(0),py(17),ps(4),{lw:'0.15'});circle(g,px(0),py(-3),ps(4),{lw:'0.15'});
  line(g,px(0),py(7),px(0),py(-5));rect(g,px(-10),py(0),ps(20),ps(8));
  rect(g,px(-2),py(-4),ps(4),ps(16));rect(g,px(2),py(-4),ps(4),ps(16));
  rect(g,px(-1.5),py(-15),ps(3),ps(6));rect(g,px(1.5),py(-15),ps(3),ps(6));
  circle(g,px(0),py(0),ps(2),{lw:'0.15'});circle(g,px(0),py(-22),ps(10),{lw:'0.25'});
  line(g,px(0),py(0),px(0),py(-12));rect(g,px(-10),py(-18),ps(20),ps(3));
  rect(g,px(-10),py(-18-150),ps(20),ps(150),{lw:'0.2'});
}

/* ===== 图7: 轮组 ===== */
function drawWheel(svg){
  const s=2,cx=105,cy=150;
  function px(x){return cx+x*s;}function py(y){return cy-y*s;}function ps(d){return Math.abs(d*s);}
  const g=el(svg,'g');
  rect(g,px(-16),py(0),ps(32),ps(5));
  [[-10],[10]].forEach(([bx2])=>{circle(g,px(bx2),py(-2.5),ps(2),{fill:'#000',lw:'0.1'});});
  rect(g,px(-11),py(-5),ps(22),ps(5));rect(g,px(-11),py(-5),ps(4),ps(31));rect(g,px(7),py(-5),ps(4),ps(31));
  const wcy=-WH+18;
  circle(g,px(0),py(wcy),ps(18));circle(g,px(0),py(wcy),ps(7.2));circle(g,px(0),py(wcy),ps(3),{fill:'#000',lw:'0.1'});
  line(g,px(-25),py(wcy),px(25),py(wcy),false);
}

/* ===== 初始化 ===== */
[[1,'立体结构示意图',drawIso],[2,'主视图（前视图）',drawFront],[3,'左视图（侧视图）',drawLeft],
 [4,'俯视图（顶视图）',drawTop],[5,'电动推杆局部放大图',drawAct],[6,'钳形夹具与力传感器局部放大图',drawClamp],
 [7,'支撑轮局部放大图',drawWheel]
].forEach(([n,t,fn])=>{const svg=makePage(n,t);fn(svg);});
</script>
</body>
